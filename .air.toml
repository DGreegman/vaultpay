root = "."
tmp_dir = "tmp"

[build]
  cmd = "go build -o ./tmp/vaultpay ./cmd/api"
  entrypoint = "./tmp/vaultpay"
  include_ext = ["go", "sql", "env"]
  exclude_dir = ["tmp", "migrations", "bin"]
  exclude_regex = ["_test\\.go"]
  delay = 300
  stop_on_error = true

[log]
  time = true

[misc]
  clean_on_exit = true